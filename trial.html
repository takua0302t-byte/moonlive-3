<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>Trial</title>
<style>
body {
  margin: 0;
  background: transparent;
  font-family: "Yu Gothic", sans-serif;
  color: white;
}

.trial-box {
  width: 520px;
  padding: 16px 20px;
  background: rgba(5, 8, 28, 0.9);
  border: 2px solid #d8c27a;
  border-radius: 20px;
  text-align: center;
  box-shadow: 0 0 20px rgba(170, 140, 255, 0.45);
}

.title {
  font-size: 24px;
  font-weight: bold;
  color: #fff3a3;
  margin-bottom: 8px;
}

.name {
  font-size: 30px;
  font-weight: bold;
  margin-bottom: 6px;
}

.time {
  font-size: 34px;
  color: #fff3a3;
  font-weight: bold;
}

.empty {
  font-size: 26px;
  color: #dcd6ff;
}
</style>
</head>

<body>
<div class="trial-box">
  <div class="title">⚔ 現在の試練</div>
  <div class="name" id="trialName">なし</div>
  <div class="time" id="trialTime">--:--</div>
</div>

<script>
let state = {
  trialName: "",
  trialEnd: 0
};

const trialName = document.getElementById("trialName");
const trialTime = document.getElementById("trialTime");

function renderTrial() {
  if (!state.trialName || !state.trialEnd) {
    trialName.textContent = "なし";
    trialTime.textContent = "--:--";
    return;
  }

  const left = Math.max(0, Math.floor((state.trialEnd - Date.now()) / 1000));
  const min = String(Math.floor(left / 60)).padStart(2, "0");
  const sec = String(left % 60).padStart(2, "0");

  trialName.textContent = state.trialName;
  trialTime.textContent = `${min}:${sec}`;
}

const events = new EventSource("/events");

events.onmessage = (event) => {
  state = JSON.parse(event.data);
  renderTrial();
};

setInterval(renderTrial, 500);
</script>
</body>
</html>
